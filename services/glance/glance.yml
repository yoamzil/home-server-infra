server:
  port: 8080
theme:
  background-color: 240 8 9
  primary-color: 43 50 70
  positive-color: 100 60 50
  negative-color: 0 70 70
  contrast-multiplier: 1.1
branding:
  logo-text: "Home"
  app-name: "Home Server"
  hide-footer: false

pages:
  - name: Overview
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: Africa/Casablanca
                label: Local
          - type: calendar

      - size: full
        widgets:
          - type: search
            search-engine: duckduckgo
            autofocus: false
            new-tab: true
            placeholder: "Search…"
            bangs:
              - title: Google
                shortcut: "!g"
                url: https://www.google.com/search?q={QUERY}
          - type: server-stats
          - type: monitor
            title: Services
            cache: 1m
            sites:
              - title: Jellyfin
                url: http://${SERVER_IP}:8096
                icon: sh:jellyfin
              - title: qBittorrent
                url: http://${SERVER_IP}:8081
                icon: sh:qbittorrent

      - size: small
        widgets:
          - type: bookmarks
            title: Quick Access
            groups:
              - title: Server Admin
                links:
                  - title: Router
                    url: http://tplinkwifi.net
                    icon: mdi:router-network
                  - title: Jellyfin
                    url: http://${SERVER_IP}:8096
                    icon: sh:jellyfin
                  - title: qBittorrent
                    url: http://${SERVER_IP}:8081
                    icon: sh:qbittorrent
          - type: docker-containers
            containers:
              jellyfin:
                icon: sh:jellyfin
              qbittorrent:
                icon: sh:qbittorrent
              glance:
                icon: sh:glance

  - name: Activity
    columns:
      - size: small
        widgets:
          - type: custom-api
            title: Transfer
            cache: 30s
            subrequests:
              transfer:
                url: http://${QBITTORRENT_IP}/api/v2/transfer/info
              seeding:
                url: http://${QBITTORRENT_IP}/api/v2/torrents/info
                parameters:
                  filter: seeding
              leeching:
                url: http://${QBITTORRENT_IP}/api/v2/torrents/info
                parameters:
                  filter: downloading
            template: |
              {{ $transfer := .Subrequest "transfer" }}
              {{ $seeding := .Subrequest "seeding" }}
              {{ $leeching := .Subrequest "leeching" }}

              {{ if and (eq $transfer.Response.StatusCode 200) (eq $seeding.Response.StatusCode 200) (eq $leeching.Response.StatusCode 200) }}
                <div class="list" style="--list-gap: 18px;">
                  <div class="flex justify-between text-center">
                    <div>
                      {{ $dl := $transfer.JSON.Float "dl_info_speed" }}
                      {{ if lt $dl 1048576.0 }}
                        <div class="color-highlight size-h3">{{ printf "%.0f" (div $dl 1024.0) }}</div>
                        <div class="size-h6">KiB/s ↓</div>
                      {{ else }}
                        <div class="color-highlight size-h3">{{ printf "%.1f" (div $dl 1048576.0) }}</div>
                        <div class="size-h6">MiB/s ↓</div>
                      {{ end }}
                    </div>
                    <div>
                      {{ $ul := $transfer.JSON.Float "up_info_speed" }}
                      {{ if lt $ul 1048576.0 }}
                        <div class="color-highlight size-h3">{{ printf "%.0f" (div $ul 1024.0) }}</div>
                        <div class="size-h6">KiB/s ↑</div>
                      {{ else }}
                        <div class="color-highlight size-h3">{{ printf "%.1f" (div $ul 1048576.0) }}</div>
                        <div class="size-h6">MiB/s ↑</div>
                      {{ end }}
                    </div>
                  </div>

                  <div class="flex justify-between text-center">
                    <div>
                      <div class="color-highlight size-h3">{{ len ($leeching.JSON.Array "") }}</div>
                      <div class="size-h6">LEECHING</div>
                    </div>
                    <div>
                      <div class="color-highlight size-h3">{{ len ($seeding.JSON.Array "") }}</div>
                      <div class="size-h6">SEEDING</div>
                    </div>
                  </div>

                  <div class="flex justify-between text-center">
                    <div>
                      {{ $dlTotal := $transfer.JSON.Float "dl_info_data" }}
                      {{ if lt $dlTotal 1073741824.0 }}
                        <div class="color-highlight size-h4">{{ printf "%.1f MiB" (div $dlTotal 1048576.0) }}</div>
                      {{ else }}
                        <div class="color-highlight size-h4">{{ printf "%.2f GiB" (div $dlTotal 1073741824.0) }}</div>
                      {{ end }}
                      <div class="size-h6">DOWNLOADED</div>
                    </div>
                    <div>
                      {{ $ulTotal := $transfer.JSON.Float "up_info_data" }}
                      {{ if lt $ulTotal 1073741824.0 }}
                        <div class="color-highlight size-h4">{{ printf "%.1f MiB" (div $ulTotal 1048576.0) }}</div>
                      {{ else }}
                        <div class="color-highlight size-h4">{{ printf "%.2f GiB" (div $ulTotal 1073741824.0) }}</div>
                      {{ end }}
                      <div class="size-h6">UPLOADED</div>
                    </div>
                  </div>
                </div>

              {{ else if eq $transfer.Response.StatusCode 401 }}
                <div class="color-negative text-center">
                  <p>Unauthorized (401)</p>
                  <p class="size-sm">Enable auth bypass in qBittorrent WebUI settings.</p>
                </div>
              {{ else }}
                <div class="color-negative text-center">
                  <p>Error {{ $transfer.Response.StatusCode }}</p>
                  <p class="size-sm">Could not reach qBittorrent.</p>
                </div>
              {{ end }}

      - size: full
        widgets:
          - type: custom-api
            title: Torrents
            cache: 30s
            subrequests:
              leeching:
                url: http://${QBITTORRENT_IP}/api/v2/torrents/info
                parameters:
                  filter: downloading
              seeding:
                url: http://${QBITTORRENT_IP}/api/v2/torrents/info
                parameters:
                  filter: seeding
            template: |
              {{ $leeching := .Subrequest "leeching" }}
              {{ $seeding := .Subrequest "seeding" }}

              {{ if and (eq $leeching.Response.StatusCode 200) (eq $seeding.Response.StatusCode 200) }}

                {{ $downloadingTorrents := $leeching.JSON.Array "" }}
                {{ $seedingTorrents := $seeding.JSON.Array "" }}

                {{ if gt (len $downloadingTorrents) 0 }}
                  <div class="size-h5" style="margin-bottom: 10px;">Downloading</div>
                  <ul class="list" style="--list-gap: 14px; margin-bottom: 20px;">
                    {{ range $t := $downloadingTorrents }}
                      {{ $state := $t.String "state" }}
                      {{ $icon := "?" }}
                      {{ if ge ($t.Int "completed") ($t.Int "size") }}{{ $icon = "✔" }}
                      {{ else if eq $state "downloading" "forcedDL" }}{{ $icon = "↓" }}
                      {{ else if eq $state "pausedDL" "stoppedDL" "pausedUP" "stalledDL" "stalledUP" "queuedDL" "queuedUP" }}{{ $icon = "❚❚" }}
                      {{ else if eq $state "error" "missingFiles" }}{{ $icon = "!" }}
                      {{ else if eq $state "checkingDL" "checkingUP" "allocating" }}{{ $icon = "…" }}
                      {{ else if eq $state "checkingResumeData" }}{{ $icon = "⟳" }}
                      {{ end }}
                      <li class="flex items-center" style="gap: 10px;">
                        <div class="size-h4" style="flex-shrink: 0;">{{ $icon }}</div>
                        <div style="flex-grow: 1; min-width: 0;">
                          <div class="text-truncate color-highlight">{{ $t.String "name" }}</div>
                          <div title="{{ $t.Float "progress" | mul 100 | printf "%.1f" }}%"
                               style="background: rgba(128,128,128,0.2); border-radius: 5px; height: 6px; margin-top: 5px; overflow: hidden;">
                            <div style="width: {{ $t.Float "progress" | mul 100 }}%; background-color: var(--color-positive); height: 100%; border-radius: 5px;"></div>
                          </div>
                        </div>
                        <div style="flex-shrink: 0; text-align: right; width: 90px;">
                          {{ $dl := $t.Float "dlspeed" }}
                          <div class="size-sm color-paragraph">
                            {{ if lt $dl 1024.0 }}--
                            {{ else if lt $dl 1048576.0 }}{{ printf "%.0f KiB/s" (div $dl 1024.0) }}
                            {{ else }}{{ printf "%.1f MiB/s" (div $dl 1048576.0) }}
                            {{ end }}
                          </div>
                          {{ $eta := $t.Int "eta" }}
                          <div class="size-sm color-paragraph">
                            {{ if eq $eta 8640000 }}∞
                            {{ else if gt $eta 3600 }}{{ printf "%dh %dm" (div $eta 3600) (mod (div $eta 60) 60) }}
                            {{ else if gt $eta 0 }}{{ printf "%dm" (div $eta 60) }}
                            {{ else }}--
                            {{ end }}
                          </div>
                        </div>
                      </li>
                    {{ end }}
                  </ul>
                {{ else }}
                  <p class="color-paragraph size-sm" style="margin-bottom: 20px;">No active downloads.</p>
                {{ end }}

                {{ if gt (len $seedingTorrents) 0 }}
                  <div class="size-h5" style="margin-bottom: 10px;">Seeding ({{ len $seedingTorrents }})</div>
                  <ul class="list collapsible-container" data-collapse-after="5" style="--list-gap: 10px;">
                    {{ range $t := $seedingTorrents }}
                      <li class="flex items-center" style="gap: 10px;">
                        <div style="flex-grow: 1; min-width: 0;">
                          <div class="text-truncate color-paragraph size-sm">{{ $t.String "name" }}</div>
                        </div>
                        <div style="flex-shrink: 0; text-align: right; width: 90px;">
                          {{ $ul := $t.Float "upspeed" }}
                          <div class="size-sm color-paragraph">
                            {{ if lt $ul 1024.0 }}--
                            {{ else if lt $ul 1048576.0 }}{{ printf "%.0f KiB/s" (div $ul 1024.0) }}
                            {{ else }}{{ printf "%.1f MiB/s" (div $ul 1048576.0) }}
                            {{ end }}
                          </div>
                        </div>
                      </li>
                    {{ end }}
                  </ul>
                {{ end }}

              {{ else }}
                <div class="color-negative text-center">
                  <p>Error fetching torrent data.</p>
                </div>
              {{ end }}
